<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <title>📚HistoryDex</title>
  </head>
  <body>
    <main>
      <img
        src="./assets/images/turing.jpg"
        alt="conteudo"
        class="conteudo_image"
        id="img_personagem"
      />

      <h1 class="conteudo">
        <span class="titulo_do_conteudo" id="titulo_nome"></span> -
        <span class="texto" id="texto_descricao"> </span>
      </h1>

      <form class="form">
        <input
          type="search"
          class="input_search"
          placeholder="Buscar nome"
          required
        />
      </form>

      <div class="buttons">
        <button class="button btn-prev">Voltar</button>
        <button class="button btn-next">Avançar</button>
      </div>

      <img src="./assets/images/tv.png" alt="tv" class="tv" />
    </main>

    <script src="./assets/js/dex.js"></script>
  </body>
</html>
