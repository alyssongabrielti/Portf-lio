<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Validação com Regex</title>
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body>
    <div class="form-container">
      <h1>Formulário de Validação</h1>
      <form id="formulario">
        <label>Nome:</label><br />
        <input type="text" id="nome" placeholder="Digite seu Nome" /><br />
        <div id="msgNome" class="mensagem"></div>
        <br />

        <label>Email:</label><br />
        <input type="text" id="email" placeholder="exemplo@gmail.com" /><br />
        <div id="msgEmail" class="mensagem"></div>
        <br />

        <label>CPF:</label><br />
        <input type="text" id="cpf" placeholder="000.000.000-00" /><br />
        <div id="msgCpf" class="mensagem"></div>
        <br />

        <button type="submit">Validar</button>
      </form>
    </div>

    <script src="./assets/js/script.js"></script>
  </body>
</html>
