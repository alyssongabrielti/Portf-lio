<!doctype html>
<html lang="pt-BR" ng-app="CadastroApp">
  <head>
    <meta charset="UTF-8" />
    <title>Cadastro Escolar</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
  </head>
  <body ng-controller="AppController">
    <h1 ng-bind="mensagem"></h1>

    <form ng-submit="adicionarUsuario()">
      <input
        type="text"
        ng-model="novoUsuario.nome"
        placeholder="Novo usuario"
        required
      />
      <select ng-model="novoUsuario.tipo" required>
        <option value="Aluno">Aluno</option>
        <option value="Professor">Professor</option>
      </select>
      <input
        type="text"
        ng-model="novoUsuario.imagem"
        placeholder="URL da imagem"
      />
      <button type="submit">Adicionar</button>
    </form>

    <input type="text" ng-model="filtro" placeholder="Buscar usuário..." />
    <select ng-model="filtroTipo">
      <option value="">Todos</option>
      <option value="Aluno">Aluno</option>
      <option value="Professor">Professor</option>
    </select>

    <div ng-controller="ListaController">
      <h2>Lista de Usuários</h2>

      <div
        ng-repeat="usuario in usuarios | filter:filtro | filter:{tipo:filtroTipo}"
      >
        <h3>{{usuario.nome | uppercase}} - {{usuario.tipo}}</h3>
        <img
          ng-src="{{usuario.imagem}}"
          alt="Foto de {{usuario.nome}}"
          width="120"
        />
        <p>Data de Cadastro: {{usuario.dataCadastro | date:'dd/MM/yyyy'}}</p>
        <button ng-click="removerUsuario($index)">Remover</button>
        <hr />
      </div>

      <p>Total de Alunos: {{ (usuarios | filter:{tipo:'Aluno'}).length }}</p>
      <p>
        Total de Professores: {{ (usuarios | filter:{tipo:'Professor'}).length
        }}
      </p>
    </div>

    <script>
      angular
        .module("CadastroApp", [])
        .service("UsuarioService", function () {
          var usuarios = [
            {
              nome: "Baby Yoda",
              tipo: "Aluno",
              imagem: "./assets/img/baby.jpg",
              dataCadastro: new Date(2026, 2, 10),
            },
            {
              nome: "Mandalorian",
              tipo: "Professor",
              imagem: "./assets/img/mandalorian.jpg",
              dataCadastro: new Date(2026, 2, 12),
            },
            {
              nome: "Luke Skywalker",
              tipo: "Aluno",
              imagem: "./assets/img/LUKE SKYWALKER.jpg",
              dataCadastro: new Date(2026, 2, 15),
            },
            {
              nome: "Leia Organa",
              tipo: "Professor",
              imagem: "./assets/img/LEIA ORGANA.jpeg",
              dataCadastro: new Date(2026, 2, 20),
            },
            {
              nome: "Han Solo",
              tipo: "Aluno",
              imagem: "./assets/img/HAN SOLO.jpeg",
              dataCadastro: new Date(2026, 2, 25),
            },
          ];

          this.listar = function () {
            return usuarios;
          };

          this.adicionar = function (usuario) {
            usuario.dataCadastro = new Date();
            usuarios.push(usuario);
          };

          this.remover = function (index) {
            usuarios.splice(index, 1);
          };
        })
        .controller("AppController", function ($scope, UsuarioService) {
          $scope.mensagem = "Bem-vindo ao sistema de cadastro escolar";
          $scope.usuarios = UsuarioService.listar();

          $scope.novoUsuario = {};

          $scope.adicionarUsuario = function () {
            if ($scope.novoUsuario.nome && $scope.novoUsuario.tipo) {
              UsuarioService.adicionar($scope.novoUsuario);
              $scope.novoUsuario = {};
            }
          };
        })
        .controller("ListaController", function ($scope, UsuarioService) {
          $scope.usuarios = UsuarioService.listar();

          $scope.removerUsuario = function (index) {
            UsuarioService.remover(index);
          };
        });
    </script>
  </body>
</html>
